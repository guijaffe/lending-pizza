<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giusto Gusto — итальянское кафе в Санкт-Петербурге</title>
  <meta name="description" content="Giusto Gusto — итальянское кафе в Санкт-Петербурге. Неаполитанская пицца из дровяной печи, свежая паста и только лучшие продукты." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Giusto Gusto — итальянское кафе в Санкт-Петербурге" />
  <meta property="og:description" content="Неаполитанская пицца из дровяной печи, свежая паста и только лучшие продукты." />
  <meta property="og:url" content="https://giustogusto.ru/" />
  <meta property="og:site_name" content="Giusto Gusto" />
  <meta property="og:locale" content="ru_RU" />
  <meta property="og:image" content="https://giustogusto.ru/welcome/assets/img/bg/bg-pizza.png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />

  <link rel="icon" href="welcome/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: #5B5B9C;
      color: #f5ede3;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    .logo {
      width: min(280px, 70vw);
      height: auto;
      margin-bottom: 40px;
      opacity: 0;
      animation: fade-in 1s .3s ease forwards;
    }

    .line {
      width: 40px;
      height: 1px;
      background: rgba(236,225,224,.35);
      margin-bottom: 32px;
      opacity: 0;
      animation: fade-in .8s .6s ease forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(24px, 5vw, 36px);
      font-weight: 500;
      letter-spacing: .02em;
      line-height: 1.4;
      color: #E6D48D;
      margin-bottom: 16px;
      opacity: 0;
      animation: fade-up .8s .8s ease forwards;
    }

    .sub {
      font-size: 14px;
      color: rgba(236,225,224,.6);
      line-height: 1.6;
      max-width: 360px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fade-up .8s 1s ease forwards;
    }


    .grain {
      position: fixed; inset: -50%; z-index: -1;
      width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 256px;
      opacity: .25;
      pointer-events: none;
      animation: grain 8s steps(10) infinite;
    }

    @keyframes fade-in { to { opacity: 1; } }
    @keyframes fade-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.8); } }
    @keyframes grain { 0%,100%{transform:translate(0)} 10%{transform:translate(-5%,-10%)} 30%{transform:translate(7%,-20%)} 50%{transform:translate(-15%,10%)} 70%{transform:translate(0,10%)} 90%{transform:translate(-10%,10%)} }
  </style>
</head>
<body>
  <div class="grain"></div>
  <img class="logo" src="welcome/assets/img/logos/logo-dark-full.svg" alt="Giusto Gusto" />
  <div class="line"></div>
  <h1>Готовим кое-что вкусное</h1>
  <p class="sub">Наш сайт в разработке, но мы уже ждём вас.<br>Неаполитанская пицца из&nbsp;дровяной печи, свежая паста и&nbsp;только лучшие продукты.</p>
  <footer style="position:fixed;bottom:20px;font-size:10px;color:rgba(236,225,224,.25);letter-spacing:.1em;">© 2026 Giusto Gusto</footer>
</body>
</html>
